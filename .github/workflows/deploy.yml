name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate Python files
        run: |
          python -m py_compile logger.py main.py api/*.py feed_module/*.py

      - name: Validate Docker files
        run: |
          test -f Dockerfile
          test -f docker-compose.yml

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Write deploy SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Add VPS to known_hosts
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${VPS_PORT:-22}" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Ensure deploy directory exists
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -p "${VPS_PORT:-22}" \
            "${VPS_USER}@${VPS_HOST}" "mkdir -p '${DEPLOY_PATH}'"

      - name: Sync project to VPS
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.idea/' \
            --exclude '.venv/' \
            --exclude '__pycache__/' \
            --exclude 'logs/' \
            --exclude '*.pyc' \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -p ${VPS_PORT:-22}" \
            ./ "${VPS_USER}@${VPS_HOST}:${DEPLOY_PATH}/"

      - name: Run remote deploy
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -p "${VPS_PORT:-22}" \
            "${VPS_USER}@${VPS_HOST}" \
            "cd '${DEPLOY_PATH}' && APP_DIR='${DEPLOY_PATH}' bash deploy/remote_deploy.sh"
