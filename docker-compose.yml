services:
  convert-api:
    container_name: convert-api
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-/srv/convert-api/shared/convert-api.env}
    ports:
      - "${HOST_PORT:-8000}:${FEED_API_PORT:-8000}"
    volumes:
      - ${APP_LOGS_DIR:-/srv/convert-api/shared/logs}:/app/logs
      - ${APP_GENERATED_DIR:-/srv/convert-api/shared/generated}:/app/feed_module/generated
