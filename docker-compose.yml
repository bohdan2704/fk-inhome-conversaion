services:
  convert-api:
    container_name: convert-api
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-/srv/convert-api/shared/convert-api.env}
    ports:
      - "127.0.0.1:${HOST_PORT:-8000}:${FEED_API_PORT:-8000}"
    volumes:
      - ${APP_LOGS_DIR:-/srv/convert-api/shared/logs}:/app/logs
      - ${APP_GENERATED_DIR:-/srv/convert-api/shared/generated}:/app/feed_module/generated
      - ${APP_DOWNLOAD_DIR:-/srv/convert-api/shared/downloaded}:/app/feed_module/downloaded
    networks:
      - app-network

  caddy:
    container_name: convert-api-caddy
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - convert-api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app-network

networks:
  app-network:

volumes:
  caddy_data:
  caddy_config:
